name = "web-pixel"
type = "web_pixel_extension"
uid = "bf0c0bec-8f6f-89f8-bcb1-0723c5ee9461eaf9defa"

runtime_context = "strict"

[settings]
type = "object"

[customer_privacy]
analytics = true
marketing = true
preferences = false
sale_of_data = "enabled"

[settings.fields.accountID]
name = "Account ID"
description = "Account ID"
type = "single_line_text_field"
validations =  [
  { name = "min", value = "1" }
]

[settings.fields.backendUrl]
name = "App backend URL"
description = "App origin with no trailing slash (e.g. https://abc.ngrok.io). Required for analytics POST."
type = "single_line_text_field"
